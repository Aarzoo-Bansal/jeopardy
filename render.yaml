# render.yaml — Render Blueprint (Infrastructure as Code)
#
# Deploys the full Jeopardy stack:
#   1. PostgreSQL 16 database
#   2. Backend API (Node.js + Express)
#   3. Frontend (React + Vite static site)
#
#
# Docs: https://docs.render.com/blueprint-spec

databases:
  - name: jeopardy-db
    plan: free
    databaseName: jeopardy
    user: jeopardy_user
    postgresMajorVersion: "16"

services:
  # ─── Backend API ────────────────────────────────────────────────
  - type: web
    name: jeopardy-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node migrate.js && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random string
      - key: DATABASE_URL
        fromDatabase:
          name: jeopardy-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: jeopardy-client
          type: web
          property: url

  # ─── Frontend Static Site ───────────────────────────────────────
  - type: web
    name: jeopardy-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html    # SPA client-side routing support
    envVars:
      - key: VITE_API_URL
        fromService:
          name: jeopardy-api
          type: web
          property: url
